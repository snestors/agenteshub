<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Impulso Deportivo · Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=block"
      rel="stylesheet"
    />
    <style>
      html, body {
        margin: 0; padding: 0;
        background: #FFFFFF;
        font-family: 'Space Grotesk', system-ui, sans-serif;
      }
      body { width: 1920px; height: 1080px; overflow: hidden; position: relative; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="impulso-demo-root"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="42.5"
    >
      <!-- Narration track 0 -->
      <audio
        id="narration"
        src="narration.wav"
        data-start="0"
        data-duration="42.5"
        data-track-index="0"
        data-volume="1"
      ></audio>

      <!-- Beats sequential on track 1 -->
      <div
        id="b1"
        data-composition-id="beat-1"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="4.14"
        data-track-index="1"
      ></div>

      <div
        id="b2"
        data-composition-id="beat-2"
        data-composition-src="compositions/beat-2-promesa.html"
        data-start="4.14"
        data-duration="6.62"
        data-track-index="1"
      ></div>

      <div
        id="b3"
        data-composition-id="beat-3"
        data-composition-src="compositions/beat-3-armado.html"
        data-start="10.76"
        data-duration="5.30"
        data-track-index="1"
      ></div>

      <div
        id="b4"
        data-composition-id="beat-4"
        data-composition-src="compositions/beat-4-asistencia.html"
        data-start="16.06"
        data-duration="4.85"
        data-track-index="1"
      ></div>

      <div
        id="b5"
        data-composition-id="beat-5"
        data-composition-src="compositions/beat-5-cobranza.html"
        data-start="20.91"
        data-duration="7.01"
        data-track-index="1"
      ></div>

      <div
        id="b6"
        data-composition-id="beat-6"
        data-composition-src="compositions/beat-6-cierre.html"
        data-start="27.92"
        data-duration="14.58"
        data-track-index="1"
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Root timeline. Sub-compositions handle their own animation; this
      // root timeline exists to satisfy the timeline registry contract.
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to({}, { duration: 42.5 });
      window.__timelines["impulso-demo-root"] = tl;
    </script>
  </body>
</html>
