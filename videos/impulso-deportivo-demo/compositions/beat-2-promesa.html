    <style>

      [data-composition-id="beat-2"] .b2-bg {

      [data-composition-id="beat-2"] .b2-veil {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Headline IN
      tl.fromTo('[data-composition-id="beat-2"] .b2-headline',
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.1);

      // Stat cards cascade
      tl.to('[data-composition-id="beat-2"] .b2-card', {
        opacity: 1, y: 0, duration: 0.55, ease: 'power3.out', stagger: 0.12
      }, 0.4);

      // Counters
      const cards = document.querySelectorAll('[data-composition-id="beat-2"] .b2-num');
      cards.forEach((el, i) => {
        const target = parseInt(el.getAttribute('data-target'), 10);
        const obj = { v: 0 };
        tl.to(obj, {
          v: target,
          duration: 1.1,
          ease: 'power2.out',
          onUpdate: () => { el.textContent = Math.round(obj.v); }
        }, 0.7 + i * 0.12);
      });

      // Cameos
      tl.fromTo('[data-composition-id="beat-2"] .b2-cameo-1',
        { x: 60, opacity: 0, rotation: -3 },
        { x: 0, opacity: 0.55, rotation: -3, duration: 0.7, ease: 'power2.out' }, 0.6);
      tl.fromTo('[data-composition-id="beat-2"] .b2-cameo-2',
        { x: 60, opacity: 0, rotation: 2 },
        { x: 0, opacity: 0.55, rotation: 2, duration: 0.7, ease: 'power2.out' }, 0.85);

      // Chips synced to VO
      tl.fromTo('[data-composition-id="beat-2"] .b2-chip-1',
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(1.6)' }, 3.0);
      tl.fromTo('[data-composition-id="beat-2"] .b2-chip-2',
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(1.6)' }, 3.6);
      tl.fromTo('[data-composition-id="beat-2"] .b2-chip-3',
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(1.6)' }, 4.45);
      tl.fromTo('[data-composition-id="beat-2"] .b2-chip-4',
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(1.6)' }, 5.1);

      // Slow drift on cameos (ambient)
      tl.to('[data-composition-id="beat-2"] .b2-cameo-1', { y: -8, duration: 2.5, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 1.0);
      tl.to('[data-composition-id="beat-2"] .b2-cameo-2', { y: -6, duration: 2.5, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 1.5);

      window.__timelines["beat-2"] = tl;
    </script>

</template>
