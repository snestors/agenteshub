      tl.fromTo('[data-composition-id="beat-3"] .b3-meta',

        { visibility: 'hidden' }, 2.95);

      tl.fromTo('[data-composition-id="beat-3"] .b3-3b',
        { opacity: 0 },

        { y: 30, scale: 0.95 },

          { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(1.5)' }, 3.5 + i * 0.18);
